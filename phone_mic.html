<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AXIS — Phone Mic</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0a0a0a; color: #e0e0e0;
    height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    -webkit-user-select: none; user-select: none;
}
.status-dot {
    width: 20px; height: 20px; border-radius: 50%;
    background: #333; margin-bottom: 24px;
    transition: background 0.3s;
}
.status-dot.connected { background: #22c55e; animation: pulse 2s infinite; }
.status-dot.muted { background: #ef4444; animation: none; }
.status-dot.connecting { background: #eab308; animation: pulse 1s infinite; }
@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}
h1 { font-size: 18px; font-weight: 500; margin-bottom: 8px; }
.subtitle { font-size: 13px; color: #888; margin-bottom: 32px; }
.level-bar {
    width: 200px; height: 4px; background: #222; border-radius: 2px;
    margin-bottom: 32px; overflow: hidden;
}
.level-fill {
    height: 100%; background: #22c55e; border-radius: 2px;
    width: 0; transition: width 0.1s;
}
.muted .level-fill { background: #ef4444; }
.btn {
    width: 72px; height: 72px; border-radius: 50%;
    border: 2px solid #333; background: transparent;
    color: #e0e0e0; font-size: 24px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, background 0.2s;
}
.btn:active { background: #222; }
.btn.muted { border-color: #ef4444; background: rgba(239,68,68,0.1); }
.error { color: #ef4444; font-size: 14px; text-align: center; max-width: 280px; }
.retry { color: #60a5fa; text-decoration: underline; cursor: pointer; margin-top: 12px; font-size: 14px; }
</style>
</head>
<body>
<div id="app">
    <div class="status-dot" id="dot"></div>
    <h1 id="title">Connecting...</h1>
    <div class="subtitle" id="subtitle"></div>
    <div class="level-bar" id="levelBar"><div class="level-fill" id="levelFill"></div></div>
    <button class="btn" id="muteBtn" style="display:none" onclick="toggleMute()">&#x1f50a;</button>
</div>

<script>
const params = new URLSearchParams(location.search);
const token = params.get('token');
const wsPort = params.get('ws_port') || '8081';
const wsHost = location.hostname;

const dot = document.getElementById('dot');
const title = document.getElementById('title');
const subtitle = document.getElementById('subtitle');
const levelFill = document.getElementById('levelFill');
const levelBar = document.getElementById('levelBar');
const muteBtn = document.getElementById('muteBtn');

let ws = null;
let audioCtx = null;
let muted = false;
let stream = null;

function showError(msg, retryable) {
    dot.className = 'status-dot';
    title.textContent = 'Error';
    subtitle.innerHTML = msg + (retryable ? '<div class="retry" onclick="connect()">Tap to retry</div>' : '');
    muteBtn.style.display = 'none';
}

function toggleMute() {
    muted = !muted;
    muteBtn.innerHTML = muted ? '&#x1f507;' : '&#x1f50a;';
    muteBtn.classList.toggle('muted', muted);
    levelBar.classList.toggle('muted', muted);
    dot.classList.toggle('muted', muted);
    dot.classList.toggle('connected', !muted);
    if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({type: muted ? 'mute' : 'unmute'}));
    }
}

async function startAudio() {
    try {
        stream = await navigator.mediaDevices.getUserMedia({
            audio: { echoCancellation: true, noiseSuppression: true, sampleRate: 16000 }
        });
    } catch(e) {
        showError('Microphone access denied.', false);
        return false;
    }

    audioCtx = new AudioContext({ sampleRate: 16000 });
    // If browser didn't honor 16kHz, we'll resample
    const actualRate = audioCtx.sampleRate;
    const ratio = actualRate / 16000;

    const source = audioCtx.createMediaStreamSource(stream);

    // Use ScriptProcessor for maximum compatibility (AudioWorklet needs same-origin)
    const bufferSize = 4096;
    const processor = audioCtx.createScriptProcessor(bufferSize, 1, 1);

    processor.onaudioprocess = function(e) {
        if (!ws || ws.readyState !== 1) return;

        const input = e.inputBuffer.getChannelData(0);
        let samples;

        if (Math.abs(ratio - 1.0) < 0.01) {
            samples = input;
        } else {
            // Resample to 16kHz
            const outLen = Math.round(input.length / ratio);
            samples = new Float32Array(outLen);
            for (let i = 0; i < outLen; i++) {
                const srcIdx = i * ratio;
                const idx = Math.floor(srcIdx);
                const frac = srcIdx - idx;
                const s0 = input[idx] || 0;
                const s1 = input[Math.min(idx + 1, input.length - 1)] || 0;
                samples[i] = s0 + frac * (s1 - s0);
            }
        }

        // Update level meter
        let rms = 0;
        for (let i = 0; i < samples.length; i++) rms += samples[i] * samples[i];
        rms = Math.sqrt(rms / samples.length);
        const pct = Math.min(100, rms * 500);
        levelFill.style.width = pct + '%';

        // Convert float32 to int16 and send
        const int16 = new Int16Array(samples.length);
        for (let i = 0; i < samples.length; i++) {
            int16[i] = Math.max(-32768, Math.min(32767, Math.round(samples[i] * 32767)));
        }
        ws.send(int16.buffer);
    };

    source.connect(processor);
    processor.connect(audioCtx.destination);
    return true;
}

async function connect() {
    if (!token) {
        showError('No pairing token. Scan the QR code from AXIS dashboard.', false);
        return;
    }

    dot.className = 'status-dot connecting';
    title.textContent = 'Connecting...';
    subtitle.textContent = '';
    muteBtn.style.display = 'none';

    const wsUrl = `wss://${wsHost}:${wsPort}/?token=${token}`;

    try {
        ws = new WebSocket(wsUrl);
    } catch(e) {
        showError('Could not connect to AXIS.', true);
        return;
    }

    ws.binaryType = 'arraybuffer';

    ws.onopen = async function() {
        const ok = await startAudio();
        if (!ok) return;

        dot.className = 'status-dot connected';
        title.textContent = 'Streaming to AXIS';
        subtitle.textContent = wsHost;
        muteBtn.style.display = 'flex';
    };

    ws.onclose = function(e) {
        if (audioCtx) { audioCtx.close(); audioCtx = null; }
        if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }

        if (e.code === 4001) {
            showError('Invalid pairing token. Scan a new QR code.', false);
        } else if (e.code === 4002) {
            showError('Another phone is already connected.', true);
        } else {
            dot.className = 'status-dot';
            title.textContent = 'Disconnected';
            subtitle.innerHTML = '<div class="retry" onclick="connect()">Tap to reconnect</div>';
            muteBtn.style.display = 'none';
        }
    };

    ws.onerror = function() {
        // onclose will fire after this
    };

    ws.onmessage = function(e) {
        try {
            const msg = JSON.parse(e.data);
            if (msg.type === 'pong') { /* keepalive */ }
        } catch(ex) {}
    };

    // Keepalive
    const keepalive = setInterval(() => {
        if (ws && ws.readyState === 1) {
            ws.send(JSON.stringify({type: 'ping'}));
        } else {
            clearInterval(keepalive);
        }
    }, 15000);
}

connect();
</script>
</body>
</html>
